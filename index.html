<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(120deg, #f6d365, #fda085);
            color: #333;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            padding: 50px;
        }

        section {
            padding: 20px;
            margin: 20px;
        }

        h1, h2, h3 {
            color: #fff;
        }

        ul, li {
            list-style-type: none;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
        }

        .skills li {
            margin: 10px;
            padding: 5px 15px;
            background-color: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
        }

        a {
            color: #333;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        nav {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            background-color: rgba(255, 255, 255, 0.7);
        }
    </style>
</head>
<body>
    <nav>
        <a href="#experience">Experience</a>
        <a href="#projects">Major Projects</a>
        <a href="#education">Education</a>
        <a href="#skills">Skills</a>
    </nav>

    <header>
        <h1>Your Name</h1>
        <p>Machine Learning and AI Expert</p>
    </header>

    <section id="experience">
        <h2>Experience</h2>
        <!-- Your Experience content here -->
    </section>

    <section id="projects">
        <h2>Major Projects</h2>
        <!-- Your Projects content here -->
    </section>

    <section id="education">
        <h2>Education</h2>
        <!-- Your Education content here -->
    </section>

    <section id="skills">
        <h2>Skills</h2>
        <div class="skills">
            <ul>
                <li>Python</li>
                <li>Matlab</li>
                <!-- ... other technical skills ... -->
            </ul>
        </div>
        <!-- ... other skills ... -->
    </section>
</body>
</html>
